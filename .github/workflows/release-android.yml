name: Build Android Release

on:
  workflow_dispatch:          # manual trigger from GitHub UI
  push:
    tags:
      - 'v*'                  # auto-trigger on version tags (e.g. v1.0.0)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/unfpa-otg-release.jks

      - name: Create keystore.properties
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=../unfpa-otg-release.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=unfpa-otg
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Play Store (if tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: org.unfpa.otg
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
